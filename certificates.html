<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hanane | Certificates</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --panel-bg:rgba(255,255,255,.06);
  --panel-border:rgba(255,255,255,.12);
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  font-family:Inter,Vazirmatn,sans-serif;
  color:white;
  background:linear-gradient(
    to bottom,
    #02040a 0%,
    #080e1e 15%,
    #121d3a 30%,
    #1f325c 45%,
    #3b5c8f 60%,
    #6993cd 75%,
    #add3f7 90%,
    #f2f8fe 100%
  );
  padding:40px 10%;
}

.container{
  max-width:1100px;
  margin:auto;
}

.back-btn{
  display:inline-block;
  margin-bottom:35px;
  padding:10px 22px;
  border-radius:999px;
  color:white;
  text-decoration:none;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  backdrop-filter:blur(12px);
  transition:.3s;
}

.back-btn:hover{
  background:rgba(255,255,255,.25);
  transform:translateY(-3px);
}

header{
  text-align:center;
  margin-bottom:50px;
}

h1{
  font-size:2.6rem;
  margin-bottom:12px;
}

header p{
  opacity:.8;
}

.certificates{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
  gap:35px;
}

.card{
  padding:28px;
  border-radius:28px;
  background:var(--panel-bg);
  border:1px solid var(--panel-border);
  backdrop-filter:blur(16px);
  box-shadow:0 20px 50px rgba(0,0,0,.35);
  transition:.3s;
}

.card:hover{
  transform:translateY(-8px);
}

.card h2{
  margin-bottom:25px;
  font-size:1.3rem;
}

.card img{
  width:100%;
  height:auto;
  display:block;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.2);
}

@media(max-width:900px){
  body{
    padding:30px 5%;
  }
}
</style>
</head>

<body>

<div class="container">

<a href="https://hanane003.github.io/portfolio/" class="back-btn">
← Back to Portfolio
</a>

<header>
<h1>Certificates</h1>
<p>Certificates and achievements</p>
</header>

<div class="certificates">

<div class="card">
<h2>UAV Control License</h2>
<img src="images/certificate_uav.png" alt="UAV Certificate">
</div>

<div class="card">
<h2>Machine Learning Certificate</h2>
<img src="images/certificate_ml.png" alt="Machine Learning Certificate">
</div>

</div>

</div>

</body>
</html>
