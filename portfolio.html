  <style>
    :root{
      --primary: #6993cd;
      --panel-bg: rgba(255,255,255,.06);
      --panel-border: rgba(255,255,255,.12);
      --text: #ffffff;
      --text-dark: #0f172a;
    }

    *{ box-sizing: border-box; }

    body{
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      overflow-x: hidden;
      background: linear-gradient(
        to bottom,
        #02040a 0%,
        #080e1e 15%,
        #121d3a 30%,
        #1f325c 45%,
        #3b5c8f 60%,
        #6993cd 75%,
        #add3f7 90%,
        #f2f8fe 100%
      );
    }

    canvas{
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    html{
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
    }

    section{
      height: 100vh;
      scroll-snap-align: start;
      scroll-snap-stop: always;

      position: relative;
      z-index: 2;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 0 10%;
    }

    section.right-content{
      justify-content: flex-end; /* fixed: never changes with language */
    }

    .panel{
      width: 50%;
      min-width: 320px;
      padding: 42px;
      border-radius: 28px;

      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    /* We DO NOT change layout direction globally.
       Only text alignment + font for Persian. */
    body[data-lang="en"] .panel{
      text-align: left;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body[data-lang="fa"] .panel{
      text-align: right;
      font-family: Vazirmatn, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* Keep numbers and emails readable even in Persian */
    .ltr{
      direction: ltr;
      unicode-bidi: embed;
      display: inline-block;
    }

    h1{
      margin: 0 0 14px 0;
      font-size: 2.35rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.15;
    }

    p{
      margin: 0;
      font-size: 1.04rem;
      line-height: 1.75;
      opacity: .88;
    }

    /* Language Switcher */
    .lang-switcher{
      position: fixed;
      top: 26px;
      right: 26px;
      z-index: 100;
      display: flex;
      gap: 10px;
    }

    .lang-btn{
      border: 1px solid var(--panel-border);
      background: rgba(255,255,255,.10);
      color: var(--text);
      padding: 9px 14px;
      border-radius: 999px;
      font-weight: 700;
      font-size: .85rem;
      cursor: pointer;
      transition: transform .2s ease, background .2s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .lang-btn:hover{
      background: rgba(255,255,255,.18);
      transform: translateY(-2px);
    }

    .lang-btn.active{
      background: rgba(255,255,255,.24);
    }

    /* Skills (layout must not flip) */
    .skills{
      margin-top: 6px;
      display: grid;
      gap: 16px;
    }

    .skill-item{
      display: grid;
      gap: 8px;
    }

    .skill-row{
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
    }

    .skill-name{
      font-weight: 700;
      opacity: .95;
    }

    .dots{
      display: flex;
      gap: 7px;
      flex-shrink: 0;
    }

    .dot{
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.06);
    }

    .dot.active{
      background: var(--primary);
      box-shadow: 0 0 14px rgba(105,147,205,.75);
    }

    /* Contact links: keep layout stable; just align text via panel text-align */
    .contact-links{
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .contact-links a{
      color: inherit;
      text-decoration: none;
      font-weight: 700;
      opacity: .92;
      transition: opacity .2s ease, transform .2s ease;
      display: inline-block;
    }

    .contact-links a:hover{
      opacity: .72;
      transform: translateX(6px);
    }

    /* IMPORTANT: do NOT reverse hover direction in FA
       to avoid “movement changed” feeling. */

    /* Day mode */
    body.day-mode{
      color: var(--text-dark);
    }

    body.day-mode .panel{
      background: rgba(15, 23, 42, 0.06);
      border-color: rgba(15, 23, 42, 0.14);
      box-shadow: 0 20px 50px rgba(0,0,0,.18);
    }

    body.day-mode .lang-btn{
      background: rgba(15, 23, 42, 0.08);
      color: var(--text-dark);
      border-color: rgba(15, 23, 42, 0.18);
    }

    body.day-mode .dot{
      background: rgba(0,0,0,.12);
      border-color: rgba(0,0,0,.06);
    }

    body.day-mode .dot.active{
      background: #1f325c;
      box-shadow: none;
    }

    @media (max-width: 900px){
      section.right-content{ justify-content: center; }
      .panel{ width: 88%; min-width: unset; padding: 28px; }
      h1{ font-size: 2rem; }
    }
  </style>

        s3_p: "<div dir=\"rtl\"><strong>• کارشناسی ارشد ژئودزی</strong><br>دانشگاه تهران (۱۴۰۴–تاکنون)<br><br><strong>• کارشناسی مهندسی نقشه‌برداری</strong><br>دانشگاه تهران (۱۴۰۰–۱۴۰۴)<br>معدل: ۱۷.۸۲ از ۲۰<br>رنک یک🏆</div>",

        sk3: "AutoCAD / Civil3D",

        sk5: "ArcGIS/QGIS",

        s6_p: "<div dir=\"rtl\">• دوره یادگیری ماشین<br>• مدرک کنترل پهپاد</div>",

        s7_p: "<div dir=\"rtl\"><br>• مقاله کنفرانسی (کنفرانس ژئوفیزیک)<br>پیش‌پردازش سری زمانی برای کاهش نویز و بازیابی داده‌ها<br>چاپ شده در ۲۰۲۴<br><span class=\"ltr\">DOI: 20.1001.2.03240016900.1403.21.1.264.0</span><br><br>• مقاله پژوهشی: در حال انجام<br>طراحی خودکار مسیر (مبتنی بر NSGA)</div>",

        s8_h: "ارتباط با من",

        l1: "hanane.hasanzade.m@gmail.com:ایمیل",
        l2: "https://linkedin.com/in/your-profile :لینکدین",

    };

    function applyLanguage(lang){
      document.body.setAttribute("data-lang", lang);

      document.querySelectorAll("[data-key]").forEach(el => {
        const key = el.getAttribute("data-key");
        el.innerHTML = translations[lang][key];
      });

      document.getElementById("btn-en").classList.toggle("active", lang === "en");
      document.getElementById("btn-fa").classList.toggle("active", lang === "fa");
    }

    document.getElementById("btn-en").addEventListener("click", () => applyLanguage("en"));
    document.getElementById("btn-fa").addEventListener("click", () => applyLanguage("fa"));

    // Initial language after HTML content is loaded
    window.addEventListener("DOMContentLoaded", () => {
      applyLanguage("en");
    });

    // Three.js
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    const dLight = new THREE.DirectionalLight(0xffffff, 2);
    dLight.position.set(5, 5, 5);
    scene.add(dLight);

    const gateLight = new THREE.DirectionalLight(0xffffff, 0);
    gateLight.position.set(-8, 10, 6);
    scene.add(gateLight);

    let earth = null;
    let uniGate = null;

    const loader = new THREE.GLTFLoader();
    loader.load("earth_3d_model1.glb", (gltf) => {
      earth = gltf.scene;
      earth.scale.set(0.08, 0.08, 0.08);
      earth.position.set(-5, 0, 0);
      earth.rotation.x = 0.5;
      earth.rotation.y = Math.PI * 1.5;
      scene.add(earth);
      window.dispatchEvent(new Event("scroll"));
    });

    // Load university gate STL
    const stlLoader = new THREE.STLLoader();
    stlLoader.load("uni.stl", (geometry) => {
        const material = new THREE.MeshStandardMaterial({
          color: 0x3c3a36,
          roughness: 0.88,
          metalness: 0.15
        });

      uniGate = new THREE.Mesh(geometry, material);

      geometry.computeVertexNormals();

      uniGate.scale.set(1, 1, 1);
      uniGate.position.set(-3, -8, 0);

      // Initial orientation — can be adjusted later
      uniGate.rotation.x = -Math.PI / 2;
      uniGate.rotation.y = 0;
      uniGate.rotation.z = 0;

      uniGate.visible = false;

      scene.add(uniGate);
    });

    function setModelOpacity(obj, value){
      obj.traverse((c) => {
        if (c && c.material){
          c.material.transparent = true;
          c.material.opacity = value;
        }
      });
    }

    window.addEventListener("scroll", () => {
      if (!earth) return;

      const sectionH = window.innerHeight;
      const progress = window.scrollY / sectionH;

      if (progress >= 4.5) document.body.classList.add("day-mode");
      else document.body.classList.remove("day-mode");

      const animatedSections = 3; // 0..2
      const t = Math.min(progress / (animatedSections - 1), 1);

      if (t < 0.6){
        const k = t / 0.6;

        const s = THREE.MathUtils.lerp(0.08, 0.22, k);
        earth.scale.set(s, s, s);

        camera.position.z = THREE.MathUtils.lerp(12, 8, k);

        earth.position.y = THREE.MathUtils.lerp(0, 10, k);

        // Fixed path independent of language
        earth.position.x = THREE.MathUtils.lerp(-5, 0, k);

        setModelOpacity(earth, 1);
        // Hide gate if loaded
        if (uniGate) uniGate.visible = false;
      } else {
        const k2 = (t - 0.6) / 0.4;

        earth.scale.set(0.22, 0.22, 0.22);
        camera.position.z = 8;
        earth.position.set(0, 10, 0);

        const earthOpacity = THREE.MathUtils.lerp(1, 0, k2);
        setModelOpacity(earth, earthOpacity);

        // Special lighting only during section 3
        if (progress > 1.7 && progress < 3){
          gateLight.intensity = 2.8;
          gateLight.position.set(-10, 12, 8);
        } else {
          gateLight.intensity = 0;
        }

        // University gate appears after Earth fades
        if (uniGate){
          uniGate.visible = true;

          // Fade in during section 3, fade out entering section 4
          let gateOpacity;

          if (progress < 2.65){
            gateOpacity = THREE.MathUtils.lerp(0, 1, Math.max(0, k2 - 0.25) / 0.75);
          } else {
            const fadeOut = Math.min((progress - 2.65) / 0.35, 1);
            gateOpacity = 1 - fadeOut;
          }

          uniGate.material.transparent = true;
          uniGate.material.opacity = gateOpacity;

          // Gentle floating motion
          const floatX = Math.sin(Date.now() * 0.0012) * 0.22;

          uniGate.position.set(
            -3 + floatX,
            THREE.MathUtils.lerp(-8, -1.5, k2),
            0
          );

          const gateScale = THREE.MathUtils.lerp(0.009, 0.02, k2);
          uniGate.scale.set(gateScale, gateScale, gateScale);

          // Hide completely after fade
          if (gateOpacity <= 0.01){
            uniGate.visible = false;
          }
        }
      }
    });

    function animate(){
      requestAnimationFrame(animate);
      if (earth) earth.rotation.y += 0.005;

      // Gate oscillating rotation
      if (uniGate && uniGate.visible){
        uniGate.rotation.z = Math.sin(Date.now() * 0.00045) * THREE.MathUtils.degToRad(5);
      }

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
